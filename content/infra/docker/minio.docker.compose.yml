services:
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-app}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000
      \"$${MINIO_ROOT_USER}\"
      \"$${MINIO_ROOT_PASSWORD}\"; do
      	echo 'Waiting for MinIO...';
       	sleep 1;
      done;
      /usr/bin/mc mb --ignore-existing
      \"local/$${MINIO_BUCKET}\";
      exit 0;
      "
volumes:
  minio_data:
